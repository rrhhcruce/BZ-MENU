<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú Mayo 2026 — BZ Group</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #e8c547;
    --accent2: #e87d47;
    --text: #f0f0f0;
    --text-muted: #888;
    --green: #4caf7d;
    --red: #e85c47;
    --blue: #478be8;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-brand {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.5px;
  }
  .header-brand span { color: var(--accent); }
  .header-user {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .header-user strong {
    color: var(--text);
    font-weight: 500;
  }
  .btn-logout {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  /* ── SCREENS ── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── LOGIN ── */
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(232,197,71,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(232,125,71,0.06) 0%, transparent 60%),
      var(--bg);
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
  }
  .login-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 32px;
    margin-bottom: 8px;
    letter-spacing: -1px;
  }
  .login-logo span { color: var(--accent); }
  .login-subtitle {
    color: var(--text-muted);
    font-size: 14px;
    margin-bottom: 36px;
  }
  .login-subtitle strong { color: var(--accent); }
  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }
  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--accent); }
  .empresa-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 8px;
  }
  .empresa-btn {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    color: var(--text-muted);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.5px;
  }
  .empresa-btn:hover { border-color: var(--accent); color: var(--text); }
  .empresa-btn.selected { border-color: var(--accent); color: var(--accent); background: rgba(232,197,71,0.08); }
  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: var(--radius);
    padding: 14px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .btn-primary:hover { background: #f0d060; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .error-msg {
    background: rgba(232,92,71,0.1);
    border: 1px solid rgba(232,92,71,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--red);
    margin-top: 12px;
    display: none;
  }

  /* ── MAIN APP ── */
  .app-wrap { max-width: 960px; margin: 0 auto; padding: 28px 20px; }

  .mes-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .mes-titulo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 26px;
    letter-spacing: -0.5px;
  }
  .mes-titulo span { color: var(--accent); }
  .mes-stats {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .stat-pill strong { color: var(--accent); }

  /* tabs admin/empleado */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 24px;
    width: fit-content;
  }
  .tab-btn {
    background: none;
    border: none;
    padding: 8px 18px;
    border-radius: 7px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    transition: all 0.2s;
  }
  .tab-btn.active { background: var(--accent); color: #0f0f0f; font-weight: 600; }

  /* ── CALENDARIO ── */
  .semana-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-muted);
    margin-bottom: 10px;
    margin-top: 20px;
  }
  .semana-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    margin-bottom: 8px;
  }
  @media (max-width: 700px) {
    .semana-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .dia-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .dia-card.elegido { border-color: var(--green); }
  .dia-card.pasado { opacity: 0.5; pointer-events: none; }

  .dia-header {
    padding: 10px 12px 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .dia-nombre {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .dia-numero {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: var(--text);
  }

  .menu-opciones { padding: 8px; display: flex; flex-direction: column; gap: 6px; }

  .menu-opcion {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    cursor: pointer;
    transition: all 0.18s;
  }
  .menu-opcion:hover { border-color: var(--accent); }
  .menu-opcion.selected { border-color: var(--green); background: rgba(76,175,125,0.08); }
  .menu-opcion.selected .tipo-badge { background: var(--green); color: #fff; }
  .menu-opcion.bloqueado { pointer-events: none; }

  .tipo-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 2px 7px;
    border-radius: 4px;
    margin-bottom: 5px;
  }
  .badge-dia { background: rgba(71,139,232,0.15); color: var(--blue); }
  .badge-sandwich { background: rgba(232,125,71,0.15); color: var(--accent2); }
  .badge-veggie { background: rgba(76,175,125,0.15); color: var(--green); }

  .menu-texto {
    font-size: 11px;
    line-height: 1.4;
    color: var(--text-muted);
  }
  .menu-opcion.selected .menu-texto { color: var(--text); }

  .confirmar-btn {
    width: 100%;
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: 8px;
    padding: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 11px;
    cursor: pointer;
    margin-top: 4px;
    transition: all 0.2s;
  }
  .confirmar-btn:hover { background: #f0d060; }
  .confirmar-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .confirmado-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    background: rgba(76,175,125,0.08);
    border-top: 1px solid rgba(76,175,125,0.2);
    font-size: 11px;
    color: var(--green);
    font-weight: 600;
  }

  /* ── ADMIN ── */
  .admin-wrap { padding: 4px 0; }
  .admin-filtros {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    align-items: center;
  }
  .filter-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
  }
  .filter-select:focus { border-color: var(--accent); }
  .admin-resumen {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }
  .resumen-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .resumen-num {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 28px;
    color: var(--accent);
  }
  .resumen-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .admin-table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  .badge-empresa {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge-pasteko { background: rgba(71,139,232,0.15); color: var(--blue); }
  .badge-stepako { background: rgba(232,125,71,0.15); color: var(--accent2); }

  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-size: 14px;
  }
  .loading::after {
    content: '';
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-left: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 20px;
    font-size: 14px;
    z-index: 999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s ease;
    max-width: 300px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.ok { border-color: var(--green); color: var(--green); }
  .toast.err { border-color: var(--red); color: var(--red); }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
    font-size: 14px;
  }
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- HEADER (oculto en login) -->
<div class="header" id="mainHeader" style="display:none">
  <div class="header-brand">BZ<span>.</span>MENÚ</div>
  <div class="header-user">
    <span>Legajo: <strong id="headerLegajo">—</strong></span>
    <span id="headerEmpresa" style="color:var(--accent);font-weight:600"></span>
    <button class="btn-logout" onclick="logout()">Salir</button>
  </div>
</div>

<!-- ════════════════════════════════════ -->
<!-- PANTALLA 1: LOGIN                   -->
<!-- ════════════════════════════════════ -->
<div class="screen active" id="screenLogin">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">BZ<span>.</span>MENÚ</div>
      <p class="login-subtitle">Elegí tu menú de <strong>Mayo 2026</strong></p>

      <div class="form-group">
        <label class="form-label">Tu legajo</label>
        <input class="form-input" type="text" id="inputLegajo" placeholder="Ej: 1042" maxlength="10">
      </div>

      <div class="form-group">
        <label class="form-label">Empresa</label>
        <div class="empresa-grid">
          <div class="empresa-btn" onclick="selectEmpresa('PASTEKO')">PASTEKO</div>
          <div class="empresa-btn" onclick="selectEmpresa('STEPAKO')">STEPAKO</div>
        </div>
      </div>

      <button class="btn-primary" id="btnEntrar" onclick="entrar()" disabled>ENTRAR</button>
      <div class="error-msg" id="loginError"></div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════ -->
<!-- PANTALLA 2: APP PRINCIPAL           -->
<!-- ════════════════════════════════════ -->
<div class="screen" id="screenApp">
  <div class="app-wrap">

    <div class="mes-header">
      <div class="mes-titulo">Mayo <span>2026</span></div>
      <div class="mes-stats">
        <div class="stat-pill">Elegidos: <strong id="statElegidos">0</strong></div>
        <div class="stat-pill">Pendientes: <strong id="statPendientes">0</strong></div>
      </div>
    </div>

    <div class="tabs" id="tabsWrap">
      <button class="tab-btn active" onclick="switchTab('menu')">Mi Menú</button>
      <button class="tab-btn" onclick="switchTab('admin')" id="tabAdmin">Elecciones</button>
      <button class="tab-btn" onclick="switchTab('cobertura')" id="tabCobertura">Cobertura</button>
    </div>

    <!-- VISTA MENÚ -->
    <div id="vistaMenu">
      <div id="calendarioWrap">
        <div class="loading">Cargando menú</div>
      </div>
    </div>

    <!-- VISTA COBERTURA -->
    <div id="vistaCobertura" style="display:none">
      <div id="coberturaContent"><div class="loading">Cargando cobertura</div></div>
    </div>

    <!-- VISTA ADMIN -->
    <div id="vistaAdmin" style="display:none">
      <div class="admin-wrap">
        <div class="admin-filtros">
          <select class="filter-select" id="filtroEmpresa" onchange="renderAdmin()">
            <option value="">Todas las empresas</option>
            <option value="PASTEKO">PASTEKO</option>
            <option value="STEPAKO">STEPAKO</option>
          </select>
          <select class="filter-select" id="filtroTipo" onchange="renderAdmin()">
            <option value="">Todos los menús</option>
            <option value="Menú del Día">Menú del Día</option>
            <option value="Menú Sandwich">Menú Sandwich</option>
            <option value="Menú Veggie">Menú Veggie</option>
          </select>
          <select class="filter-select" id="filtroFecha" onchange="renderAdmin()">
            <option value="">Todas las fechas</option>
          </select>
        </div>
        <div class="admin-resumen" id="adminResumen"></div>
        <div class="admin-table-wrap">
          <div id="adminContent"><div class="loading">Cargando datos</div></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════════
// ESTADO
// ════════════════════════════════════════════════════════════
let currentUser = null;
let eleccionesGuardadas = {};
let pendingConfirm = {};
let allData = [];
let turnosEmpleado = [];
let MOSAICO_FILTRADO = [];

// ════════════════════════════════════════════════════════════
// LOGIN
// ════════════════════════════════════════════════════════════
let empresaSeleccionada = null;

function selectEmpresa(emp) {
  empresaSeleccionada = emp;
  document.querySelectorAll('.empresa-btn').forEach(b => b.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  checkLoginReady();
}

document.getElementById('inputLegajo').addEventListener('input', checkLoginReady);

function checkLoginReady() {
  const legajo = document.getElementById('inputLegajo').value.trim();
  document.getElementById('btnEntrar').disabled = !(legajo && empresaSeleccionada);
}

async function entrar() {
  const legajo = document.getElementById('inputLegajo').value.trim();
  if (!legajo || !empresaSeleccionada) return;

  const btn = document.getElementById('btnEntrar');
  btn.disabled = true;
  btn.textContent = 'CARGANDO...';

  currentUser = { legajo, empresa: empresaSeleccionada };

  // Cargar turnos y elecciones en paralelo
  try {
    const [resTurnos, resElec] = await Promise.all([
      apiCall({ action: 'turnos', legajo, empresa: empresaSeleccionada }),
      apiCall({ action: 'obtener', legajo, empresa: empresaSeleccionada })
    ]);
    turnosEmpleado = resTurnos.ok ? resTurnos.fechas : [];
    eleccionesGuardadas = resElec.ok ? resElec.elecciones || {} : {};
  } catch(e) {
    turnosEmpleado = [];
    eleccionesGuardadas = {};
  }

  // Filtrar mosaico a los días que trabaja
  MOSAICO_FILTRADO = turnosEmpleado.length > 0
    ? MOSAICO.filter(d => turnosEmpleado.includes(d.fecha))
    : MOSAICO;

  // Mostrar app
  document.getElementById('screenLogin').classList.remove('active');
  document.getElementById('screenApp').classList.add('active');
  document.getElementById('mainHeader').style.display = 'flex';
  document.getElementById('headerLegajo').textContent = legajo;
  document.getElementById('headerEmpresa').textContent = empresaSeleccionada;

  renderCalendario();
  updateStats();
}

function logout() {
  currentUser = null;
  eleccionesGuardadas = {};
  pendingConfirm = {};
  empresaSeleccionada = null;
  document.getElementById('inputLegajo').value = '';
  document.querySelectorAll('.empresa-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('btnEntrar').textContent = 'ENTRAR';
  document.getElementById('btnEntrar').disabled = true;
  document.getElementById('screenApp').classList.remove('active');
  document.getElementById('mainHeader').style.display = 'none';
  document.getElementById('screenLogin').classList.add('active');
  switchTab('menu');
}

// ════════════════════════════════════════════════════════════
// TABS
// ════════════════════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('vistaMenu').style.display = 'none';
  document.getElementById('vistaAdmin').style.display = 'none';
  document.getElementById('vistaCobertura').style.display = 'none';
  if (tab === 'menu') {
    document.querySelector('.tab-btn:first-child').classList.add('active');
    document.getElementById('vistaMenu').style.display = 'block';
  } else if (tab === 'admin') {
    document.getElementById('tabAdmin').classList.add('active');
    document.getElementById('vistaAdmin').style.display = 'block';
    loadAdmin();
  } else if (tab === 'cobertura') {
    document.getElementById('tabCobertura').classList.add('active');
    document.getElementById('vistaCobertura').style.display = 'block';
    loadCobertura();
  }
}

// ════════════════════════════════════════════════════════════
// CALENDARIO
// ════════════════════════════════════════════════════════════
function renderCalendario() {
  const wrap = document.getElementById('calendarioWrap');
  const mosaico = MOSAICO_FILTRADO.length > 0 ? MOSAICO_FILTRADO : MOSAICO;
  if (mosaico.length === 0) {
    wrap.innerHTML = '<div class="empty-state">No se encontraron días de trabajo para este legajo en mayo.</div>';
    return;
  }
  const semanas = agruparPorSemana(mosaico);
  let html = '';

  semanas.forEach((semana, idx) => {
    const semLabel = getSemanaLabel(semana);
    html += `<div class="semana-label">${semLabel}</div>`;
    html += `<div class="semana-grid">`;
    semana.forEach(d => {
      html += renderDiaCard(d);
    });
    html += `</div>`;
  });

  wrap.innerHTML = html;
}

function renderDiaCard(d) {
  const fecha = d.fecha;
  const guardado = eleccionesGuardadas[fecha];
  const pending = pendingConfirm[fecha];
  const hoy = new Date().toISOString().split('T')[0];
  const pasado = fecha < hoy;

  let clases = 'dia-card';
  if (guardado) clases += ' elegido';

  const fechaObj = new Date(fecha + 'T12:00:00');
  const numDia = fechaObj.getDate();

  let opcionesHTML = '';

  if (guardado) {
    // Ya confirmado — mostrar solo lo elegido
    const tipoKey = guardado.tipo === 'Menú del Día' ? 'dia' : guardado.tipo === 'Menú Sandwich' ? 'sandwich' : 'veggie';
    opcionesHTML = `
      <div class="menu-opciones">
        <div class="menu-opcion selected bloqueado">
          <div class="tipo-badge badge-${tipoKey}">${guardado.tipo}</div>
          <div class="menu-texto">${guardado.menu}</div>
        </div>
      </div>
      <div class="confirmado-badge">✓ Confirmado</div>`;
  } else {
    // Mostrar opciones seleccionables
    const tipos = [
      { key: 'dia', label: 'Menú del Día', texto: d.menus.dia },
      { key: 'sandwich', label: 'Menú Sandwich', texto: d.menus.sandwich },
      { key: 'veggie', label: 'Menú Veggie', texto: d.menus.veggie },
    ];
    let opcs = tipos.map(t => {
      const sel = pending && pending.tipo === t.label ? 'selected' : '';
      return `<div class="menu-opcion ${sel}" onclick="selectMenu('${fecha}', '${t.label}', this.closest('.dia-card'))">
        <div class="tipo-badge badge-${t.key}">${t.label}</div>
        <div class="menu-texto">${t.texto}</div>
      </div>`;
    }).join('');

    const hasPending = pending != null;
    opcionesHTML = `
      <div class="menu-opciones">${opcs}</div>
      <div style="padding:0 8px 8px">
        <button class="confirmar-btn" id="btn-${fecha}" onclick="confirmar('${fecha}')" ${hasPending ? '' : 'disabled'}>
          CONFIRMAR ELECCIÓN
        </button>
      </div>`;
  }

  return `
    <div class="${clases}" id="card-${fecha}">
      <div class="dia-header">
        <span class="dia-nombre">${d.dia.substring(0,3).toUpperCase()}</span>
        <span class="dia-numero">${numDia}</span>
      </div>
      ${opcionesHTML}
    </div>`;
}

function agruparPorSemana(dias) {
  const semanas = [];
  let semanaActual = [];
  let semanaNum = null;

  dias.forEach(d => {
    const fecha = new Date(d.fecha + 'T12:00:00');
    const lunes = getLunes(fecha);
    const key = lunes.toISOString().split('T')[0];
    if (semanaNum !== key) {
      if (semanaActual.length) semanas.push(semanaActual);
      semanaActual = [];
      semanaNum = key;
    }
    semanaActual.push(d);
  });
  if (semanaActual.length) semanas.push(semanaActual);
  return semanas;
}

function getLunes(fecha) {
  const d = new Date(fecha);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d;
}

function getSemanaLabel(semana) {
  const primera = new Date(semana[0].fecha + 'T12:00:00');
  const ultima = new Date(semana[semana.length-1].fecha + 'T12:00:00');
  const opts = { day: 'numeric', month: 'long' };
  return `Semana del ${primera.toLocaleDateString('es-AR', opts)} al ${ultima.toLocaleDateString('es-AR', opts)}`;
}

function selectMenu(fecha, tipo, card) {
  // Desmarcar otros en esta card
  card.querySelectorAll('.menu-opcion').forEach(o => o.classList.remove('selected'));
  event.currentTarget.classList.add('selected');

  // Guardar pending
  const tipoKey = tipo === 'Menú del Día' ? 'dia' : tipo === 'Menú Sandwich' ? 'sandwich' : 'veggie';
  const dia = MOSAICO.find(d => d.fecha === fecha);
  pendingConfirm[fecha] = { tipo, menu: dia.menus[tipoKey] };

  // Habilitar botón confirmar
  const btn = document.getElementById('btn-' + fecha);
  if (btn) btn.disabled = false;
}

async function confirmar(fecha) {
  const pending = pendingConfirm[fecha];
  if (!pending) return;

  const btn = document.getElementById('btn-' + fecha);
  btn.disabled = true;
  btn.textContent = 'GUARDANDO...';

  const dia = MOSAICO.find(d => d.fecha === fecha);

  try {
    const res = await apiCall({
      action: 'guardar',
      legajo: currentUser.legajo,
      empresa: currentUser.empresa,
      fecha,
      lista: dia.lista,
      dia: dia.dia,
      tipo_menu: pending.tipo,
      menu: pending.menu
    });

    if (res.ok) {
      eleccionesGuardadas[fecha] = { tipo: pending.tipo, menu: pending.menu };
      delete pendingConfirm[fecha];
      // Re-render solo esta card
      const card = document.getElementById('card-' + fecha);
      card.outerHTML = renderDiaCard(dia);
      updateStats();
      showToast('✓ Menú confirmado para el ' + fecha.split('-')[2] + '/05', 'ok');
    } else {
      btn.textContent = 'CONFIRMAR ELECCIÓN';
      btn.disabled = false;
      showToast(res.error || 'Error al guardar', 'err');
    }
  } catch(e) {
    btn.textContent = 'CONFIRMAR ELECCIÓN';
    btn.disabled = false;
    showToast('Error de conexión. Intentá de nuevo.', 'err');
  }
}

function updateStats() {
  const mosaico = MOSAICO_FILTRADO.length > 0 ? MOSAICO_FILTRADO : MOSAICO;
  const total = mosaico.length;
  const elegidos = Object.keys(eleccionesGuardadas).length;
  document.getElementById('statElegidos').textContent = elegidos;
  document.getElementById('statPendientes').textContent = total - elegidos;
}

// ADMIN
// ════════════════════════════════════════════════════════════
async function loadAdmin() {
  document.getElementById('adminContent').innerHTML = '<div class="loading">Cargando datos</div>';
  try {
    const res = await apiCall({ action: 'admin' });
    if (res.ok) {
      allData = res.data || [];
      populateFiltroFechas();
      renderAdmin();
    } else {
      document.getElementById('adminContent').innerHTML = `<div class="empty-state">Error al cargar datos.</div>`;
    }
  } catch(e) {
    document.getElementById('adminContent').innerHTML = `<div class="empty-state">Error de conexión.</div>`;
  }
}

function populateFiltroFechas() {
  const fechas = [...new Set(allData.map(r => r.FECHA))].sort();
  const sel = document.getElementById('filtroFecha');
  sel.innerHTML = '<option value="">Todas las fechas</option>';
  fechas.forEach(f => {
    const opt = document.createElement('option');
    opt.value = f;
    opt.textContent = f;
    sel.appendChild(opt);
  });
}

function renderAdmin() {
  const filtEmp = document.getElementById('filtroEmpresa').value;
  const filtTipo = document.getElementById('filtroTipo').value;
  const filtFecha = document.getElementById('filtroFecha').value;

  let data = allData.filter(r => {
    if (filtEmp && r.EMPRESA !== filtEmp) return false;
    if (filtTipo && r.TIPO_MENU !== filtTipo) return false;
    if (filtFecha && r.FECHA !== filtFecha) return false;
    return true;
  });

  // Resumen
  const totalDia = data.filter(r => r.TIPO_MENU === 'Menú del Día').length;
  const totalSandwich = data.filter(r => r.TIPO_MENU === 'Menú Sandwich').length;
  const totalVeggie = data.filter(r => r.TIPO_MENU === 'Menú Veggie').length;
  document.getElementById('adminResumen').innerHTML = `
    <div class="resumen-card"><div class="resumen-num">${data.length}</div><div class="resumen-label">Elecciones totales</div></div>
    <div class="resumen-card"><div class="resumen-num">${totalDia}</div><div class="resumen-label">Menú del Día</div></div>
    <div class="resumen-card"><div class="resumen-num">${totalSandwich}</div><div class="resumen-label">Sandwich</div></div>
    <div class="resumen-card"><div class="resumen-num">${totalVeggie}</div><div class="resumen-label">Veggie</div></div>
  `;

  if (!data.length) {
    document.getElementById('adminContent').innerHTML = `<div class="empty-state">No hay elecciones que coincidan con los filtros.</div>`;
    return;
  }

  let rows = data.map(r => {
    const empClass = r.EMPRESA === 'PASTEKO' ? 'pasteko' : 'stepako';
    const tipoKey = r.TIPO_MENU === 'Menú del Día' ? 'dia' : r.TIPO_MENU === 'Menú Sandwich' ? 'sandwich' : 'veggie';
    return `<tr>
      <td>${r.TIMESTAMP}</td>
      <td><strong>${r.LEGAJO}</strong></td>
      <td><span class="badge-empresa badge-${empClass}">${r.EMPRESA}</span></td>
      <td>${r.FECHA}</td>
      <td>${r.DIA}</td>
      <td><span class="tipo-badge badge-${tipoKey}">${r.TIPO_MENU}</span></td>
      <td style="max-width:220px;font-size:12px;color:var(--text-muted)">${r.MENU}</td>
    </tr>`;
  }).join('');

  document.getElementById('adminContent').innerHTML = `
    <table>
      <thead><tr>
        <th>Timestamp</th><th>Legajo</th><th>Empresa</th>
        <th>Fecha</th><th>Día</th><th>Tipo</th><th>Menú</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// COBERTURA
// ════════════════════════════════════════════════════════════
async function loadCobertura() {
  document.getElementById('coberturaContent').innerHTML = '<div class="loading">Cargando cobertura</div>';
  try {
    const empresa = currentUser ? currentUser.empresa : '';
    const res = await apiCall({ action: 'cobertura', empresa });
    if (!res.ok) throw new Error();
    renderCobertura(res.data);
  } catch(e) {
    document.getElementById('coberturaContent').innerHTML = '<div class="empty-state">Error al cargar cobertura.</div>';
  }
}

function renderCobertura(data) {
  if (!data || !data.length) {
    document.getElementById('coberturaContent').innerHTML = '<div class="empty-state">No hay datos de turnos cargados.</div>';
    return;
  }
  const totalDias = data.length;
  const completados = data.filter(d => d.elegidos === d.total).length;
  const pct = totalDias > 0 ? Math.round(completados / totalDias * 100) : 0;
  const totalElec = data.reduce((s,d) => s + d.elegidos, 0);
  const totalPend = data.reduce((s,d) => s + (d.total - d.elegidos), 0);

  let html = `
    <div class="admin-resumen" style="margin-bottom:20px">
      <div class="resumen-card"><div class="resumen-num">${pct}%</div><div class="resumen-label">Días completos</div></div>
      <div class="resumen-card"><div class="resumen-num">${totalElec}</div><div class="resumen-label">Elegidos</div></div>
      <div class="resumen-card"><div class="resumen-num" style="color:var(--red)">${totalPend}</div><div class="resumen-label">Pendientes</div></div>
    </div>
    <div class="admin-table-wrap"><table>
      <thead><tr><th>Fecha</th><th>Empresa</th><th>Elegidos</th><th>Total</th><th>%</th><th>Faltantes</th></tr></thead>
      <tbody>`;

  data.forEach(d => {
    const pctDia = d.total > 0 ? Math.round(d.elegidos / d.total * 100) : 0;
    const color = pctDia === 100 ? 'var(--green)' : pctDia >= 50 ? 'var(--accent)' : 'var(--red)';
    const faltantesStr = d.faltantes && d.faltantes.length
      ? d.faltantes.slice(0,5).join(', ') + (d.faltantes.length > 5 ? ` +${d.faltantes.length - 5} más` : '')
      : '—';
    const empClass = d.empresa === 'PASTEKO' ? 'pasteko' : 'stepako';
    html += `<tr>
      <td>${d.fecha}</td>
      <td><span class="badge-empresa badge-${empClass}">${d.empresa}</span></td>
      <td><strong>${d.elegidos}</strong></td>
      <td>${d.total}</td>
      <td><span style="color:${color};font-weight:700">${pctDia}%</span></td>
      <td style="font-size:11px;color:var(--text-muted);max-width:220px">${faltantesStr}</td>
    </tr>`;
  });
  html += '</tbody></table></div>';
  document.getElementById('coberturaContent').innerHTML = html;
}

// ════════════════════════════════════════════════════════════
// API
// ════════════════════════════════════════════════════════════
async function apiCall(params) {
  const qs = new URLSearchParams(params).toString();
  const url = `${SCRIPT_URL}?${qs}`;
  const res = await fetch(url, { redirect: 'follow' });
  return res.json();
}

// ════════════════════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════════════════════
let toastTimer;
function showToast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.classList.remove('show'); }, 3500);
}
</script>
